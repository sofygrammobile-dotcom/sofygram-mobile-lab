<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Sofygram | الاشتراك الذهبي</title>
    <style>
        body { background: #050a14; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { background: #121212; padding: 30px; border-radius: 25px; border: 1px solid #ffd700; max-width: 450px; margin: 20px auto; }
        h2 { color: #ffd700; }
        .lang-btn { background: #222; color: #ffd700; border: 1px solid #ffd700; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .price-tag { font-size: 24px; font-weight: bold; color: #ffd700; margin: 15px 0; }
        .btn-pay { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div style="text-align: left;">
    <button class="lang-btn" onclick="toggleLang()">English / العربية</button>
</div>

<div class="card">
    <h2 id="title">خطوة التفعيل الذهبية 👑</h2>
    <p id="desc">سعر الاشتراك الذهبي الخاص بالأطباء هو 20,000 د.ع</p>
    <div class="price-tag" id="price">20,000 د.ع</div>
    
    <button class="btn-pay" onclick="window.open('https://wa.me/9647807466488', '_blank')">إرسال الوصل للواتساب 📲</button>
</div>

<script>
    const langData = {
        ar: { 
            title: "خطوة التفعيل الذهبية 👑", 
            desc: "سعر الاشتراك الذهبي الخاص بالأطباء هو 20,000 د.ع",
            price: "20,000 د.ع"
        },
        en: { 
            title: "Gold Activation Step 👑", 
            desc: "Gold subscription price for doctors is 20,000 IQD",
            price: "20,000 IQD"
        }
    };

    function applyLang(lang) {
        document.getElementById('htmlTag').dir = lang === 'en' ? 'ltr' : 'rtl';
        document.getElementById('title').innerText = langData[lang].title;
        document.getElementById('desc').innerText = langData[lang].desc;
        document.getElementById('price').innerText = langData[lang].price;
    }

    function toggleLang() {
        let lang = localStorage.getItem('sofygramLang') === 'en' ? 'ar' : 'en';
        localStorage.setItem('sofygramLang', lang);
        applyLang(lang);
    }

    window.onload = () => {
        const savedLang = localStorage.getItem('sofygramLang') || 'ar';
        applyLang(savedLang);
    };
</script>
</body>
</html>
