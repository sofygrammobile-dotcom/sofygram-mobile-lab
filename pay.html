<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Sofygram | صفحة الدفع</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #ffd700; max-width: 400px; margin: 20px auto; }
        .lang-btn { background: #222; color: #ffd700; border: 1px solid #ffd700; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div style="text-align: left; padding: 20px;">
    <button class="lang-btn" onclick="toggleLang()">English / العربية</button>
</div>

<div class="card">
    <h2 id="title">خطوة التفعيل الأخيرة 👑</h2>
    <p id="desc">سعر الاشتراك 15,000 د.ع (داخل العراق) أو 15 دولار (خارج العراق)</p>
    <!-- باقي محتويات صفحة الدفع الخاصة بك -->
</div>

<script>
    const langData = {
        ar: { title: "خطوة التفعيل الأخيرة 👑", desc: "سعر الاشتراك 15,000 د.ع (داخل العراق) أو 15 دولار (خارج العراق)" },
        en: { title: "Final Activation Step 👑", desc: "Subscription price 15,000 IQD (Inside Iraq) or $15 (Outside Iraq)" }
    };

    function applyLang(lang) {
        document.getElementById('htmlTag').dir = lang === 'en' ? 'ltr' : 'rtl';
        document.getElementById('title').innerText = langData[lang].title;
        document.getElementById('desc').innerText = langData[lang].desc;
    }

    function toggleLang() {
        let lang = localStorage.getItem('sofygramLang') === 'en' ? 'ar' : 'en';
        localStorage.setItem('sofygramLang', lang);
        applyLang(lang);
    }

    // عند تحميل الصفحة، نطبق اللغة المحفوظة
    window.onload = () => {
        const savedLang = localStorage.getItem('sofygramLang') || 'ar';
        applyLang(savedLang);
    };
</script>
</body>
</html>
