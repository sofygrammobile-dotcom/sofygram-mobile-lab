<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | البحث الصوتي الذكي 🔍</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; --bg: #050a14; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .search-card { background: #121212; padding: 25px; border-radius: 30px; max-width: 600px; margin: 20px auto; border: 1px solid #222; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .search-title { color: var(--glow); font-size: 22px; margin-bottom: 20px; font-weight: bold; }
        
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; padding-right: 5px; }
        select, input { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--glow); }

        .btn-search { background: var(--glow); color: #000; padding: 16px; width: 100%; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-search:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        .results-container { max-width: 600px; margin: 20px auto; text-align: right; }
        .clinic-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 22px; margin-bottom: 12px; transition: 0.3s; border-right: 6px solid var(--glow); cursor: pointer; text-decoration: none; color: white; }
        .clinic-row:hover { transform: translateY(-2px); background: #24334d; }
        
        .no-results { color: #e74c3c; font-weight: bold; margin-top: 20px; font-size: 16px; background: rgba(231, 76, 60, 0.1); padding: 15px; border-radius: 15px; border: 1px dashed #e74c3c; text-align: center; }
        .badge { background: rgba(255, 215, 0, 0.1); color: var(--glow); border: 1px solid var(--glow); padding: 3px 8px; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="search-card">
        <div class="search-title"><i class="fa-solid fa-wand-magic-sparkles"></i> البحث الصوتي الذكي</div>
        
        <div class="form-group">
            <label>اختر الدولة</label>
            <select id="countrySelect" onchange="loadStates()">
                <option value="">-- اختر الدولة --</option>
                <option value="العراق">العراق 🇮🇶</option>
                <option value="السعودية">السعودية 🇸🇦</option>
                <option value="الإمارات">الإمارات 🇦🇪</option>
            </select>
        </div>

        <div class="form-group">
            <label>اختر المحافظة / المدينة</label>
            <select id="stateSelect">
                <option value="">-- اختر المحافظة أولاً --</option>
            </select>
        </div>

        <div class="form-group">
            <label>اسم الطبيب أو العيادة (اختياري)</label>
            <input type="text" id="nameSearch" placeholder="🔍 اكتب اسم الطبيب للبحث المباشر...">
        </div>

        <button class="btn-search" onclick="performSearch()">
            <i class="fa-solid fa-rocket"></i> ابحث الآن
        </button>
    </div>

    <div class="results-container" id="resultsList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        // الإعدادات الجديدة المأخوذة من لقطة الشاشة الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyA3BtNZYPLaDTEjuh0AjMp43RZrQGALFBU",
            authDomain: "sofygram-mobile-app.firebaseapp.com",
            databaseURL: "https://sofygram-mobile-app-default-rtdb.firebaseio.com",
            projectId: "sofygram-mobile-app",
            storageBucket: "sofygram-mobile-app.firebasestorage.app",
            messagingSenderId: "190753733711",
            appId: "1:190753733711:web:0ce4a97a2878120ff37e3a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // قائمة المحافظات والمدن المحدثة
        const locations = {
            "العراق": ["بغداد", "النجف", "كربلاء", "البصرة", "بابل", "الأنبار", "أربيل", "السليمانية", "دهوك", "ديالى", "ذي قار", "صلاح الدين", "كركوك", "ميسان", "المثنى", "نينوى", "القادسية", "واسط"],
            "السعودية": ["الرياض", "جدة", "مكة", "المدينة", "الدمام", "الخبر", "أبها", "تبوك"],
            "الإمارات": ["دبي", "أبوظبي", "الشارقة", "عجمان", "رأس الخيمة", "الفجيرة"]
        };

        window.loadStates = () => {
            const country = document.getElementById('countrySelect').value;
            const stateSelect = document.getElementById('stateSelect');
            stateSelect.innerHTML = '<option value="">-- كل المحافظات --</option>';
            
            if(country && locations[country]) {
                locations[country].forEach(st => {
                    stateSelect.innerHTML += `<option value="${st}">${st}</option>`;
                });
            }
        };

        window.performSearch = () => {
            const country = document.getElementById('countrySelect').value;
            const state = document.getElementById('stateSelect').value;
            const nameQuery = document.getElementById('nameSearch').value.toLowerCase().trim();
            const resultsList = document.getElementById('resultsList');
            
            resultsList.innerHTML = '<p style="text-align:center; color:var(--glow);"><i class="fa-solid fa-spinner fa-spin"></i> جاري البحث في السيرفر الجديد...</p>';

            get(ref(db, 'users')).then((snap) => {
                resultsList.innerHTML = "";
                const data = snap.val();
                if(!data) {
                    resultsList.innerHTML = '<div class="no-results">❌ لم يتم العثور على أي عيادات مسجلة حالياً.</div>';
                    return;
                }

                let found = false;
                // تصفية وعرض المستخدمين النشطين فقط
                Object.keys(data).forEach(id => {
                    const u = data[id];
                    
                    // التحقق من فلاتر البحث والتوافق مع بنية السيرفر الجديد
                    const matchesCountry = !country || (u.country && u.country === country);
                    const matchesState = !state || (u.state && u.state === state);
                    const matchesName = !nameQuery || (u.name && u.name.toLowerCase().includes(nameQuery));
                    
                    // إظهار الطبيب إذا كان حسابه نشطاً ومطابقاً للبحث
                    if(u.active && matchesCountry && matchesState && matchesName) {
                        found = true;
                        resultsList.innerHTML += `
                            <a href="view.html?id=${id}" class="clinic-row">
                                <div>
                                    <b style="font-size:18px;"><i class="fa-user-md fa-solid"></i> د. ${u.name}</b><br>
                                    <small style="color:#aaa;"><i class="fa-solid fa-location-dot"></i> ${u.state || ''} - ${u.country || ''}</small>
                                </div>
                                <span class="badge"><i class="fa-solid fa-circle-check"></i> متصل</span>
                            </a>`;
                    }
                });

                if(!found) {
                    resultsList.innerHTML = '<div class="no-results">لم يتم العثور على نتائج تطابق بحثك الحالي. 🔍</div>';
                }
            }).catch(err => {
                resultsList.innerHTML = `<div class="no-results">خطأ في الاتصال بقاعدة البيانات: ${err.message}</div>`;
            });
        };
    </script>
</body>
</html>
