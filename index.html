<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | المنظومة المتكاملة 🔍👑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; --bg: #050a14; --card-bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 15px; margin: 0; text-align: center; }
        
        .header-main-title { color: var(--glow); font-size: 26px; margin: 20px 0; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* 1️⃣ كرت قسم البحث الصوتي الذكي القديم مالتك */
        .search-card { background: var(--card-bg); padding: 25px; border-radius: 30px; max-width: 700px; margin: 20px auto; border: 2px solid #222; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .search-title { color: var(--glow); font-size: 22px; margin-bottom: 20px; font-weight: bold; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { text-align: right; }
        select, input { width: 100%; padding: 16px; border-radius: 20px; border: 2px solid #111; background: #050a14; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; font-weight: bold; text-align: center; }
        select:focus, input:focus { border-color: var(--glow); }

        .btn-search { background: var(--glow); color: #000; padding: 18px; width: 100%; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }

        /* 2️⃣ قسم لوحة الاشتراكات والتحكم (بنفس الواجهة) */
        .admin-section-title { color: var(--glow); font-size: 22px; margin: 40px 0 20px 0; font-weight: bold; border-bottom: 2px dashed #222; padding-bottom: 10px; }
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 10px; }
        
        .stat-card { background: var(--card-bg); border: 1px solid #222; padding: 20px; border-radius: 25px; text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; border-top: 4px solid #333; }
        .stat-card.active-clinic { border-top-color: #2ecc71; }
        .stat-card.expired-clinic { border-top-color: #e74c3c; }

        .clinic-name { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .clinic-info { font-size: 14px; color: #aaa; margin: 4px 0; display: flex; align-items: center; gap: 8px; }
        .clinic-info i { color: var(--glow); }

        .actions-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; border-top: 1px solid #222; padding-top: 15px; }
        .btn-action { padding: 10px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-activate { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
        .btn-activate:hover { background: #2ecc71; color: #000; }
        .btn-block { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; }
        .btn-block:hover { background: #e74c3c; color: #fff; }

        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .status-active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-expired { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        /* الأزرار الملونة السفلية الفخمة مالتك */
        .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 700px; margin: 30px auto; }
        .feature-btn { background: #000; border: 1px solid #333; padding: 15px; border-radius: 20px; color: #fff; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .feature-btn i { color: var(--glow); }

        .results-container { max-width: 700px; margin: 20px auto; text-align: right; }
        .clinic-row { display: flex; justify-content: space-between; align-items: center; background: #121212; padding: 18px; border-radius: 22px; margin-bottom: 12px; border-right: 6px solid var(--glow); text-decoration: none; color: white; border: 1px solid #222; }
        
        @media (max-width: 600px) {
            .grid-container, .features-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header-main-title">
        👑 منظومة سوفيغرام الذكية الشاملة
    </div>

    <!-- 🔍 قسم البحث الصوتي الذكي القديم مالتك -->
    <div class="search-card">
        <div class="search-title">البحث الصوتي الذكي</div>
        
        <div class="grid-container">
            <div class="form-group">
                <select id="countrySelect" onchange="loadStates()">
                    <option value="">اختر الدولة</option>
                    <option value="العراق">العراق 🇮🇶</option>
                    <option value="السعودية">السعودية 🇸🇦</option>
                    <option value="الإمارات">الإمارات 🇦🇪</option>
                </select>
            </div>
            <div class="form-group">
                <select id="stateSelect">
                    <option value="">اختر المحافظة/المدينة</option>
                </select>
            </div>
        </div>

        <div class="grid-container">
            <div class="form-group">
                <select id="typeSelect">
                    <option value="">نوع النشاط</option>
                    <option value="دكتور">دكتور</option>
                    <option value="مختبر">مختبر</option>
                    <option value="صيدلية">صيدلية</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="nameSearch" placeholder="دكتور">
            </div>
        </div>

        <button class="btn-search" onclick="performSearch()">
            🚀 ابحث الآن
        </button>
    </div>

    <!-- نتائج البحث تظهر هنا مباشرة -->
    <div class="results-container" id="resultsList"></div>

    <!-- 📊 قسم إدارة الاشتراكات والكروت (في نفس الصفحة بالأسفل) -->
    <div class="admin-section-title">
        <i class="fa-solid fa-users-gear"></i> لوحة التحكم بالاشتراكات والعيادات المسجلة
    </div>

    <div class="analytics-grid" id="clinicsContainer">
        <p style="grid-column: 1/-1; color: var(--glow);"><i class="fa-solid fa-spinner fa-spin"></i> جاري الاتصال بالسيرفر وجلب الحسابات الحالية...</p>
    </div>

    <!-- الأزرار السفلية الفخمة مالتك -->
    <div class="features-grid">
        <div class="feature-btn"><i class="fa-solid fa-star"></i> تنظيم الطوابير عالمياً</div>
        <div class="feature-btn"><i class="fa-solid fa-clock"></i> وداعاً للانتظار المزعج</div>
        <div class="feature-btn"><i class="fa-solid fa-bolt"></i> متابعة فورية لدورك</div>
        <div class="feature-btn"><i class="fa-solid fa-gem"></i> فخامة وسهولة</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3BtNZYPLaDTEjuh0AjMp43RZrQGALFBU",
            authDomain: "sofygram-mobile-app.firebaseapp.com",
            databaseURL: "https://sofygram-mobile-app-default-rtdb.firebaseio.com",
            projectId: "sofygram-mobile-app",
            storageBucket: "sofygram-mobile-app.firebasestorage.app",
            messagingSenderId: "190753733711",
            appId: "1:190753733711:web:0ce4a97a2878120ff37e3a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allData = {};
        const locations = {
            "العراق": ["بغداد", "النجف", "كربلاء", "البصرة", "بابل", "الأنبار", "أربيل", "السليمانية", "دهوك", "ديالى", "ذي قار", "صلاح الدين", "كركوك", "ميسان", "المثنى", "نينوى", "القادسية", "واسط"],
            "السعودية": ["الرياض", "جدة", "مكة", "المدينة"],
            "الإمارات": ["دبي", "أبوظبي", "الشارقة"]
        };

        window.loadStates = () => {
            const country = document.getElementById('countrySelect').value;
            const stateSelect = document.getElementById('stateSelect');
            stateSelect.innerHTML = '<option value="">اختر المحافظة/المدينة</option>';
            if(country && locations[country]) {
                locations[country].forEach(st => {
                    stateSelect.innerHTML += `<option value="${st}">${st}</option>`;
                });
            }
        };

        // دالة جلب البيانات وعرض كروت الاشتراكات بالأسفل
        function loadAllData() {
            get(ref(db, 'users')).then((snap) => {
                allData = snap.val() || {};
                renderAdminCards();
            }).catch(err => {
                document.getElementById('clinicsContainer').innerHTML = `<p style="color:red;">خطأ: ${err.message}</p>`;
            });
        }

        function renderAdminCards() {
            const container = document.getElementById('clinicsContainer');
            container.innerHTML = "";
            let hasData = false;

            Object.keys(allData).forEach(id => {
                const u = allData[id];
                hasData = true;
                const isActive = u.active === true;
                const cardClass = isActive ? 'stat-card active-clinic' : 'stat-card expired-clinic';
                const badge = isActive ? '<span class="status-badge status-active">نشط ومفعل ✅</span>' : '<span class="status-badge status-expired">منتهي الاشتراك ❌</span>';

                container.innerHTML += `
                    <div class="${cardClass}">
                        <div>
                            <div class="clinic-name"><i class="fa-user-md fa-solid" style="color:var(--glow);"></i> د. ${u.name || 'غير محدد'}</div>
                            <div class="clinic-info"><i class="fa-solid fa-phone"></i> الهاتف: ${u.phone || 'لا يوجد'}</div>
                            <div class="clinic-info"><i class="fa-solid fa-location-dot"></i> الموقع: ${u.state || ''} - ${u.country || ''}</div>
                            ${badge}
                        </div>
                        <div class="actions-area">
                            <button class="btn-action btn-activate" onclick="toggleStatus('${id}', true)">تفعيل</button>
                            <button class="btn-action btn-block" onclick="toggleStatus('${id}', false)">إلغاء</button>
                        </div>
                    </div>`;
            });

            if(!hasData) container.innerHTML = '<p>لا توجد حسابات مسجلة حالياً بالسيرفر.</p>';
        }

        // دالة تفعيل الحسابات الفورية
        window.toggleStatus = (id, status) => {
            update(ref(db, `users/${id}`), { active: status }).then(() => {
                alert("تم تحديث حالة العيادة بنجاح! 🎉");
                loadAllData();
            });
        };

        // دالة البحث العلوي
        window.performSearch = () => {
            const country = document.getElementById('countrySelect').value;
            const state = document.getElementById('stateSelect').value;
            const nameQuery = document.getElementById('nameSearch').value.toLowerCase().trim();
            const resultsList = document.getElementById('resultsList');
            
            resultsList.innerHTML = '<p style="text-align:center; color:var(--glow);"><i class="fa-solid fa-spinner fa-spin"></i> جاري البحث...</p>';
            
            let found = false;
            resultsList.innerHTML = "";

            Object.keys(allData).forEach(id => {
                const u = allData[id];
                if(u.active && (!country || u.country === country) && (!state || u.state === state) && (!nameQuery || u.name.toLowerCase().includes(nameQuery))) {
                    found = true;
                    resultsList.innerHTML += `
                        <a href="view.html?id=${id}" class="clinic-row">
                            <div>
                                <b style="font-size:18px;">د. ${u.name}</b><br>
                                <small style="color:#aaa;">${u.state || ''} - ${u.country || ''}</small>
                            </div>
                            <span class="status-badge status-active">متصل</span>
                        </a>`;
                }
            });

            if(!found) resultsList.innerHTML = '<div style="color:#fff; background:#121212; padding:15px; border-radius:20px; border:1px dashed #333;">لم يتم العثور على نتائج تطابق بحثك.</div>';
        };

        // تشغيل التحميل التلقائي
        loadAllData();
    </script>
</body>
</html>
