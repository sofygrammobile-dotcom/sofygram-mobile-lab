<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | التسجيل العالمي 🌐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #050a14; --card: #121c2c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .reg-card { background: var(--card); padding: 30px; border-radius: 35px; max-width: 550px; margin: 20px auto; border: 1px solid var(--gold); box-shadow: 0 0 25px rgba(255, 215, 0, 0.15); }
        h2 { color: var(--gold); margin-bottom: 25px; }
        label { display: block; text-align: right; margin: 10px 25px 5px 0; font-size: 14px; color: #aaa; }
        input, select { padding: 15px; border-radius: 18px; border: 1px solid #333; background: #000; color: #fff; text-align: center; margin-bottom: 15px; width: 95%; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-reg { background: linear-gradient(45deg, var(--gold), #ff8c00); color: black; padding: 18px; width: 95%; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 19px; margin-top: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="reg-card">
        <h2>انضم إلى صوفيگرام 🌐</h2>
        <p id="planDisplay" style="color:var(--gold); font-weight:bold; margin-bottom:20px;"></p>
        
        <label>اسم النشاط التجاري:</label>
        <input type="text" id="name" placeholder="مثلاً: دكتور علي / مطعم الصقر">
        
        <label>فئة النشاط:</label>
        <select id="type">
            <option value="">-- اختر الفئة --</option>
            <option>أطباء وعيادات</option><option>صيدليات</option><option>مختبرات</option>
            <option>مطاعم وكافيهات</option><option>أسواق ومولات</option>
        </select>

        <label>الدولة:</label>
        <select id="country" onchange="loadCities()">
            <option value="">اختر الدولة</option>
            <option value="العراق">العراق 🇮🇶</option>
            <option value="غير ذلك">غير ذلك</option>
        </select>

        <label>المحافظة / المدينة:</label>
        <select id="citySelect"></select>
        <input type="text" id="cityInput" class="hidden" placeholder="اكتب اسم المدينة">

        <label>رقم الواتساب:</label>
        <input type="tel" id="phone" placeholder="07XXXXXXXXX">

        <label>اليوزر والباسوورد:</label>
        <input type="text" id="username" placeholder="اسم المستخدم (إنجليزي)">
        <input type="password" id="pass" placeholder="كلمة المرور">

        <button onclick="register()" class="btn-reg">تأكيد التسجيل والانطلاق 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyA3BtNZYPLaDTEjuh0AjMp43RzRQGALFBU",
          databaseURL: "https://sofygram-mobile-app-default-rtdb.firebaseio.com",
          projectId: "sofygram-mobile-app",
          storageBucket: "sofygram-mobile-app.firebasestorage.app",
          messagingSenderId: "190753733711",
          appId: "1:190753733711:web:0ce4a97a2878120ff37e3a"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan');
        if(plan === 'gold') document.getElementById('planDisplay').innerText = "⭐ أنت الآن تسجل في الاشتراك الذهبي";
        else document.getElementById('planDisplay').innerText = "💎 أنت الآن تسجل في الاشتراك الفضي";

        window.loadCities = () => {
            const country = document.getElementById('country').value;
            const ciSe = document.getElementById('citySelect');
            const ciIn = document.getElementById('cityInput');
            if(country === "العراق") {
                ciSe.classList.remove('hidden'); ciIn.classList.add('hidden');
                ciSe.innerHTML = '<option value="النجف">النجف</option><option value="كربلاء">كربلاء</option><option value="بغداد">بغداد</option>';
            } else {
                ciSe.classList.add('hidden'); ciIn.classList.remove('hidden');
            }
        };

        window.register = () => {
            const name = document.getElementById('name').value;
            const user = document.getElementById('username').value.trim();
            if(!name || !user) return alert("يرجى إكمال البيانات الأساسية!");

            // تنبيه المستخدم أن العملية بدأت
            alert("جاري حفظ بياناتك في قاعدة البيانات، يرجى الانتظار...");

            set(ref(db, 'users/' + user), {
                name: name,
                type: document.getElementById('type').value,
                phone: document.getElementById('phone').value,
                country: document.getElementById('country').value,
                city: document.getElementById('citySelect').value || document.getElementById('cityInput').value,
                password: document.getElementById('pass').value,
                active: false,
                regDate: new Date().toISOString()
            }).then(() => {
                alert("تم التسجيل بنجاح! ننتقل الآن لصفحة الدفع.");
                const targetPage = (plan === 'gold') ? 'pay20.html' : 'pay.html';
                window.location.href = `${targetPage}?user=${user}&name=${encodeURIComponent(name)}`;
            }).catch(error => {
                alert("حدث خطأ أثناء التسجيل: " + error.message);
            });
        };
    </script>
</body>
</html>
