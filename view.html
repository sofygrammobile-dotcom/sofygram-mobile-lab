<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | تفاصيل العيادة ⚕️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glow: #2ecc71; --gold: #ffd700; --bg: #050a14; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .profile-card { background: #121212; padding: 30px; border-radius: 35px; max-width: 500px; margin: 30px auto; border: 1px solid #222; box-shadow: 0 0 25px rgba(0,0,0,0.6); text-align: right; }
        .avatar-area { text-align: center; margin-bottom: 20px; }
        .avatar-area i { id: profileIcon; font-size: 70px; color: var(--gold); background: rgba(255,215,0,0.1); padding: 20px; border-radius: 50%; border: 1px solid var(--gold); }
        
        .info-item { background: #1e293b; padding: 14px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border-left: 5px solid var(--gold); }
        .info-item i { color: var(--gold); font-size: 18px; width: 25px; text-align: center; }
        
        .btn-back { background: rgba(255,255,255,0.1); color: #fff; padding: 12px 25px; border: 1px solid #444; border-radius: 20px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn-back:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div class="profile-card" id="profileCard">
        <p style="text-align:center; color:var(--gold);"><i class="fa-solid fa-spinner fa-spin"></i> جاري جلب ملف الطبيب...</p>
    </div>

    <div style="text-align: center;">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-right"></i> العودة للبحث</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3BtNZYPLaDTEjuh0AjMp43RZrQGALFBU",
            authDomain: "sofygram-mobile-app.firebaseapp.com",
            databaseURL: "https://sofygram-mobile-app-default-rtdb.firebaseio.com",
            projectId: "sofygram-mobile-app",
            storageBucket: "sofygram-mobile-app.firebasestorage.app",
            messagingSenderId: "190753733711",
            appId: "1:190753733711:web:0ce4a97a2878120ff37e3a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const clinicId = urlParams.get('id');

        const card = document.getElementById('profileCard');

        if(!clinicId) {
            card.innerHTML = '<p style="text-align:center; color:#e74c3c;">⚠️ عذراً، لم يتم تحديد معرف العيادة بشكل صحيح.</p>';
        } else {
            get(ref(db, `users/${clinicId}`)).then((snap) => {
                const u = snap.val();
                if(!u) {
                    card.innerHTML = '<p style="text-align:center; color:#e74c3c;">⚠️ العيادة المطلوبة غير موجودة أو انتهت صلاحيتها.</p>';
                    return;
                }

                card.innerHTML = `
                    <div class="avatar-area">
                        <i class="fa-solid fa-user-doctor"></i>
                        <h2 style="color:var(--gold); margin-top:15px; text-align:center;">د. ${u.name || 'غير محدد'}</h2>
                    </div>
                    
                    <div class="info-item">
                        <i class="fa-solid fa-map-location-dot"></i>
                        <div>
                            <small style="color:#aaa; display:block;">العنوان والمنطقة</small>
                            <b>${u.state || ''} - ${u.country || ''}</b>
                        </div>
                    </div>

                    <div class="info-item">
                        <i class="fa-solid fa-phone"></i>
                        <div>
                            <small style="color:#aaa; display:block;">رقم الهاتف</small>
                            <b>${u.phone || '---'}</b>
                        </div>
                    </div>

                    <div class="info-item" style="border-left-color: var(--glow);">
                        <i class="fa-solid fa-circle-check" style="color:var(--glow);"></i>
                        <div>
                            <small style="color:#aaa; display:block;">حالة الحساب</small>
                            <b style="color:var(--glow);">عيادة معتمدة ونشطة ✅</b>
                        </div>
                    </div>
                `;
            }).catch(err => {
                card.innerHTML = `<p style="text-align:center; color:#e74c3c;">خطأ أثناء تحميل البيانات: ${err.message}</p>`;
            });
        }
    </script>
</body>
</html>
