<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Admin | دخول السيطرة 🔐</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
        .admin-card { background: #121212; padding: 25px; border-radius: 30px; max-width: 450px; margin: auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.1); }
        .num-display { font-size: 110px; font-weight: bold; color: #fff; margin: 10px 0; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .btn-round { width: 85px; height: 85px; border-radius: 50%; border: none; font-size: 45px; cursor: pointer; color: white; margin: 10px; transition: 0.3s; }
        .plus { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .minus { background: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        input, textarea, select { width: 90%; padding: 12px; margin: 8px 0; border-radius: 12px; background: #1e293b; color: white; border: 1px solid #333; text-align: center; }
        .btn-save { background: var(--glow); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 95%; cursor: pointer; margin-top: 10px; }
        .tools-grid { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; }
        #qr-area { background: white; padding: 10px; border-radius: 12px; display: inline-block; }
    </style>
</head>
<body>

    <div id="loginBox" class="admin-card">
        <img src="logo.png" style="width:140px; margin-bottom:20px;" onerror="this.src='https://sofygram.com/logo.png'">
        <h2 style="color:var(--glow);">دخول الإدارة والسكرتارية 🔐</h2>
        <input type="text" id="u" placeholder="اسم المستخدم (مثل: hf2026)">
        <input type="password" id="p" placeholder="كلمة المرور">
        <button onclick="login()" class="btn-save">دخول</button>
    </div>

    <div id="controlBox" class="admin-card" style="display:none;">
        <h2 id="cName" style="color:var(--glow); margin:0;"></h2>
        <div class="num-display" id="n">
