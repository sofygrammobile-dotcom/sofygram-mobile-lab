<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | لوحة التحكم والاشتراكات 👑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; --bg: #050a14; --card-bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 15px; margin: 0; text-align: center; }
        
        .header-title { color: var(--glow); font-size: 26px; margin: 20px 0; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* شريط البحث والفلترة العلوي مالتك */
        .controls-card { background: var(--card-bg); padding: 20px; border-radius: 25px; max-width: 900px; margin: 0 auto 25px auto; border: 1px solid #222; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .controls-card input, .controls-card select { padding: 12px 20px; border-radius: 15px; border: 1px solid #333; background: #050a14; color: white; font-size: 15px; font-weight: bold; outline: none; min-width: 200px; text-align: center; }
        .controls-card input:focus, .controls-card select:focus { border-color: var(--glow); }

        /* شبكة عرض كروت العيادات والاشتراكات */
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 10px; }
        
        /* كرت العيادة الفخم المحدث */
        .stat-card { background: var(--card-bg); border: 1px solid #222; padding: 20px; border-radius: 25px; text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; border-top: 4px solid #333; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 0 15px rgba(255,215,0,0.1); }
        .stat-card.active-clinic { border-top-color: #2ecc71; }
        .stat-card.expired-clinic { border-top-color: #e74c3c; }

        .clinic-name { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .clinic-info { font-size: 14px; color: #aaa; margin: 4px 0; display: flex; align-items: center; gap: 8px; }
        .clinic-info i { color: var(--glow); width: 18px; text-align: center; }

        /* أزرار التحكم بالاشتراكات والطقوس القديمة */
        .actions-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; border-top: 1px solid #222; padding-top: 15px; }
        .btn-action { padding: 10px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-activate { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
        .btn-activate:hover { background: #2ecc71; color: #000; }
        .btn-block { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; }
        .btn-block:hover { background: #e74c3c; color: #fff; }

        /* باجات الحالة */
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .status-active { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-expired { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
    </style>
</head>
<body>

    <div class="header-title">
        <i class="fa-solid fa-chart-line"></i> لوحة التحكم في العيادات والاشتراكات
    </div>

    <!-- شريط فلاتر البحث مالتك القديم -->
    <div class="controls-card">
        <input type="text" id="searchBar" placeholder="🔍 ابحث باسم الطبيب أو الهاتف..." oninput="renderClinics()">
        <select id="statusFilter" onchange="renderClinics()">
            <option value="all">كل الاشتراكات</option>
            <option value="active">النشطة فقط ✅</option>
            <option value="expired">المنتهية فقط ❌</option>
        </select>
    </div>

    <!-- شبكة عرض الحسابات -->
    <div class="analytics-grid" id="clinicsContainer">
        <p style="grid-column: 1/-1; color: var(--glow);"><i class="fa-solid fa-spinner fa-spin"></i> جاري الاتصال بالسيرفر الجديد وجلب الاشتراكات...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3BtNZYPLaDTEjuh0AjMp43RZrQGALFBU",
            authDomain: "sofygram-mobile-app.firebaseapp.com",
            databaseURL: "https://sofygram-mobile-app-default-rtdb.firebaseio.com",
            projectId: "sofygram-mobile-app",
            storageBucket: "sofygram-mobile-app.firebasestorage.app",
            messagingSenderId: "190753733711",
            appId: "1:190753733711:web:0ce4a97a2878120ff37e3a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allClinics = {};

        // جلب البيانات فوراً من السيرفر الجديد
        function fetchClinics() {
            get(ref(db, 'users')).then((snap) => {
                allClinics = snap.val() || {};
                renderClinics();
            }).catch(err => {
                document.getElementById('clinicsContainer').innerHTML = `<p style="color:red;">خطأ أثناء جلب البيانات: ${err.message}</p>`;
            });
        }

        // عرض العيادات بناءً على الفلترة والبحث
        window.renderClinics = () => {
            const container = document.getElementById('clinicsContainer');
            const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
            const statusFilter = document.getElementById('statusFilter').value;
            
            container.innerHTML = "";
            let count = 0;

            Object.keys(allClinics).forEach(id => {
                const u = allClinics[id];
                
                // التأكد من الفلاتر والبحث
                const matchesSearch = !searchQuery || 
                                     (u.name && u.name.toLowerCase().includes(searchQuery)) || 
                                     (u.phone && u.phone.includes(searchQuery));
                                     
                const isActive = u.active === true;
                const matchesStatus = statusFilter === 'all' || 
                                     (statusFilter === 'active' && isActive) || 
                                     (statusFilter === 'expired' && !isActive);

                if (matchesSearch && matchesStatus) {
                    count++;
                    const cardClass = isActive ? 'stat-card active-clinic' : 'stat-card expired-clinic';
                    const badge = isActive ? '<span class="status-badge status-active">نشط ومفعل ✅</span>' : '<span class="status-badge status-expired">منتهي الاشتراك ❌</span>';

                    container.innerHTML += `
                        <div class="${cardClass}">
                            <div>
                                <div class="clinic-name"><i class="fa-user-md fa-solid" style="color:var(--glow);"></i> د. ${u.name || 'غير محدد'}</div>
                                <div class="clinic-info"><i class="fa-solid fa-phone"></i> الهاتف: ${u.phone || 'لا يوجد'}</div>
                                <div class="clinic-info"><i class="fa-solid fa-location-dot"></i> الموقع: ${u.state || ''} - ${u.country || ''}</div>
                                <div class="clinic-info"><i class="fa-solid fa-layer-group"></i> النشاط: ${u.type || 'دكتور'}</div>
                                ${badge}
                            </div>
                            <div class="actions-area">
                                <button class="btn-action btn-activate" onclick="toggleStatus('${id}', true)">
                                    <i class="fa-solid fa-check"></i> تفعيل
                                </button>
                                <button class="btn-action btn-block" onclick="toggleStatus('${id}', false)">
                                    <i class="fa-solid fa-ban"></i> إلغاء التفعيل
                                </button>
                            </div>
                        </div>
                    `;
                }
            });

            if(count === 0) {
                container.innerHTML = '<p style="grid-column:1/-1; color:#aaa;">لا توجد عيادات مطابقة للبحث الحالي.</p>';
            }
        };

        // دالة التفعيل أو الغاء التفعيل المباشر بالسيرفر الجديد
        window.toggleStatus = (id, status) => {
            if(confirm(`هل أنت متأكد من تغيير حالة اشتراك هذه العيادة؟`)) {
                update(ref(db, `users/${id}`), { active: status }).then(() => {
                    alert("تم تحديث حالة الاشتراك بنجاح! 🎉");
                    fetchClinics(); // إعادة تحميل القائمة
                }).catch(err => {
                    alert("حدث خطأ أثناء التحديث: " + err.message);
                });
            }
        };

        // تشغيل الجلب عند فتح الصفحة
        fetchClinics();
    </script>
</body>
</html>
