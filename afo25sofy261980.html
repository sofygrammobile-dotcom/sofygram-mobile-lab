<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master V3 | الإدارة الملكية 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; --bg: #050a14; --card: #121212; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: var(--card); padding: 25px; border-radius: 30px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        
        .stats-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-weight: bold; }
        .stat-item { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--glow); padding: 8px 15px; border-radius: 12px; font-size: 14px; color: var(--glow); }

        input { padding: 14px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 16px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 15px; width: 90%; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 0 #27ae60; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-right: 6px solid #888; text-align: right; }
        .active-user { border-right-color: #2ecc71; }
        .expired-user { border-right-color: #e74c3c; opacity: 0.9; }

        .btn-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; color: white; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-f { background: #2ecc71; } .btn-t { background: #f1c40f; color: #000; } .btn-p { background: #9b59b6; } .btn-h { background: #3498db; } .btn-d { background: #e74c3c; }
        
        .staff-section { margin-top: 40px; padding: 20px; border-top: 1px dashed #444; text-align: right; }
        .staff-item { background: #000; padding: 12px; border-radius: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .days-badge { background: var(--glow); color: #000; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        .assistant-tag { color: #2ecc71; font-size: 12px; margin-top: 5px; display: block; background: rgba(46, 204, 113, 0.1); padding: 5px; border-radius: 8px; }
        .edit-panel { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; margin-top: 10px; display: none; border: 1px solid #444; }
        .btn-sm { padding: 5px; font-size: 11px; margin: 2px; flex: 1; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <img src="logo.png" style="width:120px; margin-bottom:15px;">
        <h2 id="t-lock">قفل الإدارة الملكية V3 👑</h2>
        <input type="password" id="mPass" placeholder="كلمة المرور">
        <button onclick="masterLogin()" class="btn-king">دخول السيطرة 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <div class="stats-bar">
            <div class="stat-item">📋 العيادات: <span id="countUsers">0</span></div>
            <div class="stat-item">👥 الموظفين: <span id="countStaff">0</span></div>
        </div>

        <h2 style="color:var(--glow);">لوحة التحكم والأمان 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث عن مشترك..." onkeyup="filterUsers()">
        
        <div id="usersList">جاري تحميل البيانات...</div>

        <div class="staff-section">
            <h3 style="color:#3498db;"><i class="fas fa-users-cog"></i> إدارة الموظفين (Staff)</h3>
            <div id="staffList"></div>
            <button onclick="addStaff()" style="background:#3498db; color:white; border:none; padding:12px; width:100%; border-radius:12px; cursor:pointer; font-weight:bold;">+ إضافة موظف جديد</button>
        </div>
        
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <button onclick="changePass()" style="background:none; color:#888; border:1px solid #444; padding:8px; border-radius:10px; cursor:pointer; font-size:11px;">⚙️ تغيير رمز دخول الماستر</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, remove, set, push } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let masterHash = "e10adc3949ba59abbe56e057f20f883e"; 
        get(ref(db, 'admin_settings/masterHash')).then((s) => { if(s.exists()) masterHash = s.val(); });

        window.masterLogin = () => {
            const p = document.getElementById('mPass').value;
            if (CryptoJS.MD5(p).toString() === masterHash || p === "@@@###$$$112233<?>19801992") {
                document.getElementById('authBox').style.display='none';
                document.getElementById('masterBox').style.display='block';
                loadUsers();
                loadStaff();
            } else { alert("رمز خطأ!"); }
        };

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val();
                const list = document.getElementById('usersList'); list.innerHTML = "";
                if(!data) { document.getElementById('countUsers').innerText = "0"; return; }
                
                let usersArr = [];
                for(let id in data) { usersArr.push({id, ...data[id]}); }
                document.getElementById('countUsers').innerText = usersArr.length;

                // الترتيب: الأحدث (بناءً على تاريخ التسجيل أو الإضافة) يظهر في الأعلى
                usersArr.sort((a, b) => (b.regDate || 0) > (a.regDate || 0) ? 1 : -1);

                usersArr.forEach(u => {
                    const expiry = u.expiryDate ? new Date(u.expiryDate) : null;
                    let daysLeft = expiry ? Math.ceil((expiry - new Date()) / (1000*60*60*24)) : 0;
                    
                    let assistantsHtml = "";
                    if(u.assistants) {
                        Object.keys(u.assistants).forEach(k => {
                            assistantsHtml += `<span class="assistant-tag"><i class="fas fa-user-shield"></i> معاون: ${u.assistants[k].name} | رمز: ${u.assistants[k].password}</span>`;
                        });
                    }

                    list.innerHTML += `
                        <div class="user-row ${daysLeft > 0 ? 'active-user' : 'expired-user'}" data-name="${(u.name || '').toLowerCase()}">
                            <div style="flex:1;">
                                <b style="font-size:18px;">${u.name}</b> <span class="days-badge">${daysLeft > 0 ? daysLeft + ' يوم' : '!!!'}</span><br>
                                <small style="color:#aaa;">ينتهي: ${expiry ? expiry.toLocaleDateString('en-GB') : '---'}</small>
                                ${assistantsHtml}
                                <div id="info-${u.id}" class="edit-panel"></div>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-f" onclick="setSub('${u.id}', 30)">تفعيل شهر</button>
                                <button class="btn btn-t" onclick="setSub('${u.id}', 3)">تجربة 3 أيام</button>
                                <button class="btn btn-p" onclick="toggleEdit('${u.id}', '${u.name}', '${u.password}', '${u.phone || ''}')">🔑 تعديل البيانات</button>
                                <button class="btn btn-h" onclick="showPhone('${u.id}', '${u.phone || 'لا يوجد'}')">📱 الهاتف</button>
                                <button class="btn btn-d" onclick="delUser('${u.id}')">حذف</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.toggleEdit = (id, name, pass, phone) => {
            const div = document.getElementById(`info-${id}`);
            if(div.style.display === 'block') { div.style.display = 'none'; return; }
            div.innerHTML = `
                <div style="display:flex; flex-wrap:wrap; gap:5px;">
                    <button class="btn btn-edit btn-sm" style="background:#3498db" onclick="editField('${id}', 'name', '${name}')">تعديل الاسم</button>
                    <button class="btn btn-edit btn-sm" style="background:#9b59b6" onclick="editField('${id}', 'password', '${pass}')">تعديل الرمز</button>
                    <button class="btn btn-edit btn-sm" style="background:#e67e22" onclick="editField('${id}', 'phone', '${phone}')">تعديل الهاتف</button>
                </div>
                <div style="margin-top:5px; font-size:12px; color:#fff;">الرمز الحالي: <b>${pass}</b></div>
            `;
            div.style.display = 'block';
        };

        window.editField = (id, field, current) => {
            const label = field === 'name' ? 'الاسم الجديد' : field === 'password' ? 'الرمز الجديد' : 'رقم الهاتف الجديد';
            const n = prompt(`تعديل ${label}:`, current);
            if(n !== null && n !== current) {
                let upd = {}; upd[field] = n;
                update(ref(db, `users/${id}`), upd).then(() => alert("تم التحديث بنجاح ✅"));
            }
        };

        function loadStaff() {
            onValue(ref(db, 'staff'), (snap) => {
                const list = document.getElementById('staffList'); list.innerHTML = "";
                const data = snap.val();
                if(!data) { document.getElementById('countStaff').innerText = "0"; return; }
                let count = 0;
                for(let id in data) {
                    count++;
                    list.innerHTML += `
                        <div class="staff-item">
                            <span>👤 ${data[id].name} (رمز: <b>${data[id].password}</b>)</span>
                            <div style="display:flex; gap:5px;">
                                <button onclick="editStaff('${id}', '${data[id].name}')" style="background:#3498db; border:none; color:white; padding:6px 10px; border-radius:8px; cursor:pointer; font-size:11px;">تعديل</button>
                                <button onclick="delStaff('${id}')" style="background:#e74c3c; border:none; color:white; padding:6px 10px; border-radius:8px; cursor:pointer; font-size:11px;">حذف</button>
                            </div>
                        </div>`;
                }
                document.getElementById('countStaff').innerText = count;
            });
        }

        window.addStaff = () => {
            const name = prompt("اسم الموظف الجديد:");
            const pass = prompt("كلمة سر الموظف:");
            if(name && pass) { push(ref(db, 'staff'), { name, password: pass }); }
        };

        window.delStaff = (id) => { if(confirm("حذف الموظف نهائياً؟")) remove(ref(db, `staff/${id}`)); };
        window.editStaff = (id, name) => {
            const newP = prompt(`الرمز الجديد لـ ${name}:`);
            if(newP) update(ref(db, `staff/${id}`), { password: newP });
        };

        window.setSub = (id, days) => {
            const exp = new Date(); exp.setDate(exp.getDate() + days);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() }).then(()=>alert("تم التفعيل ✅"));
        };

        window.showPhone = (id, ph) => {
            const div = document.getElementById(`info-${id}`);
            if(div.style.display === 'block') { div.style.display = 'none'; return; }
            div.innerHTML = ph === 'لا يوجد' ? '🚫 لا يوجد رقم' : `<a href="https://wa.me/${ph.replace(/\D/g,'')}" target="_blank" style="color:#25d366; text-decoration:none;"><i class="fab fa-whatsapp"></i> واتساب: ${ph}</a>`;
            div.style.display = 'block';
        };

        window.delUser = (id) => { if(confirm("حذف المشترك نهائياً؟")) remove(ref(db, `users/${id}`)); };
        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
        window.changePass = () => {
            const n = prompt("رمز الماستر الجديد:");
            if(n) { set(ref(db, 'admin_settings/masterHash'), CryptoJS.MD5(n).toString()).then(()=>location.reload()); }
        };
    </script>
</body>
</html>
