<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | لوحة المعاونين الاحترافية 🛠️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #2ecc71; --red: #e74c3c; --gold: #ffd700; --bg: #050a14; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; display: none; }
        .card { background: #121212; padding: 20px; border-radius: 30px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
        .stats-bar { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); padding: 12px; border-radius: 15px; margin-bottom: 20px; color: var(--gold); font-weight: bold; font-size: 15px; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 12px; text-align: right; transition: 0.3s; border-right: 8px solid transparent; }
        /* ألوان الاشتراك */
        .active-user { border-right-color: var(--glow); }
        .expired-user { border-right-color: var(--red); }

        .btn { padding: 8px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 11px; width: 100%; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-month { background: #2ecc71; }
        .btn-test { background: #f1c40f; color: #000; }
        .btn-wa { background: #25d366; text-decoration: none; }
        
        .badge { padding: 3px 8px; border-radius: 8px; font-weight: bold; font-size: 11px; margin-right: 5px; }
        .badge-green { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .badge-red { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

        input { width: 92%; padding: 14px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin-bottom: 15px; outline: none; }
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-tools">
             <button onclick="logout()" style="background:var(--red); color:white; border:none; padding:6px 12px; border-radius:10px; cursor:pointer; font-weight:bold;">خروج 🚪</button>
             <div id="staffInfo" style="color:var(--glow); font-size:13px; font-weight:bold;"></div>
        </div>

        <div class="stats-bar">📊 إحصائيات المنصة: <span id="count">0</span> عيادة</div>
        
        <input type="text" id="mSearch" placeholder="🔍 ابحث عن اسم العيادة..." onkeyup="filter()">
        
        <div id="list">جاري تحميل البيانات...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        // قفل الأمان
        if(sessionStorage.getItem('staff_auth') !== 'true') {
            alert("عذراً، الدخول للمصرح لهم فقط! 🔐");
            location.href = 'admin.html';
        } else {
            document.body.style.display = 'block';
            document.getElementById('staffInfo').innerText = "المعاون: " + sessionStorage.getItem('staff_name');
        }

        const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        onValue(ref(db, 'users'), (snap) => {
            const data = snap.val(); const list = document.getElementById('list'); list.innerHTML = "";
            if(!data) return;

            let users = Object.keys(data).map(id => ({id, ...data[id]}));
            document.getElementById('count').innerText = users.length;

            // الترتيب: الأحدث في الأعلى (نفس الماستر)
            users.reverse().forEach(u => {
                const expiry = u.expiryDate ? new Date(u.expiryDate) : null;
                const now = new Date();
                let days = expiry ? Math.ceil((expiry - now) / (1000*60*60*24)) : 0;
                let isActive = u.active && days > 0;

                list.innerHTML += `
                    <div class="user-row ${isActive ? 'active-user' : 'expired-user'}" data-name="${(u.name || '').toLowerCase()}">
                        <div style="flex:1;">
                            <b style="font-size:17px;">${u.name}</b> 
                            <span class="badge ${isActive ? 'badge-green' : 'badge-red'}">${isActive ? days + ' يوم متبقي' : 'منتهي !!!'}</span><br>
                            <small style="color:#aaa;">تاريخ الانتهاء: ${expiry ? expiry.toLocaleDateString('en-GB') : 'غير محدد'}</small><br>
                            <small style="color:var(--gold);">الهاتف: ${u.phone || '---'}</small>
                        </div>
                        <div style="min-width:110px; display:flex; flex-direction:column; gap:3px;">
                            <button class="btn btn-month" onclick="setSub('${u.id}', 30)">تفعيل شهر</button>
                            <button class="btn btn-test" onclick="setSub('${u.id}', 3)">تجربة 3 أيام</button>
                            <a href="https://wa.me/${(u.phone || '').replace(/\D/g,'')}" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> واتساب</a>
                        </div>
                    </div>`;
            });
        });

        window.setSub = (id, d) => {
            const exp = new Date(); exp.setDate(exp.getDate() + d);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() })
            .then(() => alert("تم التحديث بنجاح ✅"));
        };

        window.logout = () => { sessionStorage.clear(); location.href = 'admin.html'; };
        
        window.filter = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>
